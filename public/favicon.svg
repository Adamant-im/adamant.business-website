<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="cryptofoundry">
  <defs>
    <linearGradient id="ember" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#ffb45c"/>
      <stop offset="0.55" stop-color="#f07316"/>
      <stop offset="1" stop-color="#d1540e"/>
    </linearGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4a3b2a"/>
      <stop offset="1" stop-color="#2a2118"/>
    </linearGradient>
  </defs>
  <!-- hexagonal hallmark (flat-top), rounded corners via stroke join -->
  <path d="M61 32 46.5 57.1 17.5 57.1 3 32 17.5 6.9 46.5 6.9Z"
        fill="#181310" stroke="#181310" stroke-width="5" stroke-linejoin="round"/>
  <path d="M58.4 32 45.2 54.9 18.8 54.9 5.6 32 18.8 9.1 45.2 9.1Z"
        fill="none" stroke="url(#rim)" stroke-width="2" stroke-linejoin="round"/>
  <!-- molten "c" — thick machined arc with square-cut terminals -->
  <path d="M42.4 41.3 A14 14 0 1 1 42.4 22.7"
        fill="none" stroke="url(#ember)" stroke-width="9.5" stroke-linecap="butt"/>
  <!-- spark -->
  <path d="M48.6 32 52.1 35.5 48.6 39 45.1 35.5Z" fill="#ffc061" transform="translate(0 -3.5)"/>
</svg>
